name: Trivy Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/trivy.yml'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    # wöchentlich, Dienstag 04:23 UTC (nach Dependabot Montag)
    - cron: '23 4 * * 2'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  dockerfile-scan:
    name: Trivy Dockerfile (misconfig)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Trivy Dockerfile scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-config.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload config SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-config.sarif'
          category: 'trivy-config'

  image-scan:
    name: Trivy Image (CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: tocco-mate:trivy
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: 'tocco-mate:trivy'
          format: 'sarif'
          output: 'trivy-image.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload image SARIF to Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-image.sarif'
          category: 'trivy-image'

      - name: Summary for PR
        if: always()
        run: |
          echo "### Trivy Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "Siehe Security-Tab für detaillierte Findings." >> $GITHUB_STEP_SUMMARY
